version: '3.8'

services:
  # PostgreSQL db
  postgres:
    image: postgres:15-alpine
    container_name: childguard-db
    environment:
      POSTGRES_USER: childguard
      POSTGRES_PASSWORD: childguard_dev_password
      POSTGRES_DB: childguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - childguard
    restart: unless-stopped

  # Mosquitto MQTT Broker
   mosquitto:
    image: eclipse-mosquitto:2
    container_name: childguard-mqtt
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"  # MQTT
      - "9001:9001"  # WebSocket
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./acl.acl:/mosquitto/config/acl.acl
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - childguard
    restart: unless-stopped

    # ChildGuard Flask Backend
    backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: childguard-backend
    environment:
      # Flask
      FLASK_ENV: development
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-secret-key-change-in-production}
      
      # Database (PostgreSQL)
      DATABASE_URL: postgresql://childguard:childguard_dev_password@postgres:5432/childguard
      
      # MQTT
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      
      # Twilio (optional)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      
      # CPIMS (optional)
      CPIMS_API_URL: ${CPIMS_API_URL:-}
      CPIMS_API_KEY: ${CPIMS_API_KEY:-}
      
      # Server
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 5000
      CORS_ORIGINS: http://localhost:3000,http://localhost:8000,http://localhost
      
      # Logging
      LOG_LEVEL: DEBUG
      LOG_FILE: /app/logs/childguard.log
    
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      - postgres
      - mosquitto
    networks:
      - childguard
    command: python app.py
    restart: unless-stopped

    # Nginx Reverse Proxy (Optional - for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: childguard-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - childguard
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_logs:
    driver: local

networks:
  childguard:
    driver: bridge
