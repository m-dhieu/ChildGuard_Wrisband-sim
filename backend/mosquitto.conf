# Mosquitto MQTT Broker Configuration

# Networking

# TCP listener
listener 1883
protocol mqtt
max_connections -1
max_queued_messages 1000

# WebSocket listener (for browser clients)
listener 9001
protocol websockets
max_connections -1

# Authentication

# Allow anonymous connections (set to false in production!)
allow_anonymous true

# Optional: password file for authentication
# password_file /mosquitto/config/passwd

# Persistence

# Enable persistence
persistence true
persistence_location /mosquitto/data/

# Persist file naming
persistence_file mosquitto.db

# Save persistence file every X seconds
autosave_interval 60

# Security

# Default ACL (allow all topics in development)
# acl_file /mosquitto/config/acl.acl

# Logging

# Log destinations
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Logging level: debug, info, notice, warning, error
log_type debug
log_timestamp true

# Performance

# Message size limit (bytes)
message_size_limit 0

# Connection Settings
# Allow duplicate client IDs (for development)
