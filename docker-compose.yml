version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: childguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
  mqtt:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    command: -v
  app:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db
      - mqtt
    env_file: .env

